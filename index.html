<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity APK Extractor & Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
        <h1 class="font-bold text-lg text-amber-500">Unity APK Extractor 2.0</h1>
        <div id="dropZone" class="cursor-pointer border-2 border-dashed border-zinc-700 px-6 py-2 rounded-lg hover:border-blue-500 transition">
            Load APK
            <input type="file" id="fileInput" class="hidden">
        </div>
    </header>

    <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
        
        <section id="viewport" class="flex-1 bg-black rounded-2xl border border-zinc-800 relative overflow-hidden shadow-inner">
            <canvas id="renderCanvas" class="w-full h-full"></canvas>
            <div id="gui-overlay" class="absolute inset-0 pointer-events-none p-6">
                <div class="absolute bottom-10 left-10 w-24 h-24 border-4 border-zinc-500/50 rounded-full"></div> </div>
        </section>

        <section class="h-1/3 grid grid-cols-3 gap-4">
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4">
                <h2 class="text-xs font-bold uppercase text-zinc-500 mb-2">Live Scanner</h2>
                <div id="logs" class="flex-1 overflow-y-auto text-xs font-mono"></div>
            </div>
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4">
                <h2 class="text-xs font-bold uppercase text-zinc-500 mb-2">3D Models</h2>
                <ul id="modelList" class="flex-1 overflow-y-auto"></ul>
            </div>
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4">
                <h2 class="text-xs font-bold uppercase text-zinc-500 mb-2">All Assets</h2>
                <ul id="assetList" class="flex-1 overflow-y-auto"></ul>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
