<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity APK Extractor & Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
        <h1 class="font-bold text-lg text-amber-500 tracking-tight">Unity APK Extractor 2.0</h1>
        <div id="dropZone" class="cursor-pointer border-2 border-dashed border-zinc-700 px-6 py-2 rounded-lg hover:border-blue-500 hover:bg-zinc-800 transition-all duration-200">
            <span class="text-sm">Load APK</span>
            <input type="file" id="fileInput" class="hidden">
        </div>
    </header>

    <main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">

        <section id="viewport" class="flex-1 bg-black rounded-2xl border border-zinc-800 relative overflow-hidden shadow-inner">
            <canvas id="renderCanvas" class="w-full h-full block"></canvas>
            
            <div id="gui-overlay" class="absolute inset-0 pointer-events-none p-6 flex flex-col justify-between">
                <div class="flex justify-between">
                    <div id="status-badge" class="bg-zinc-900/60 backdrop-blur-sm px-3 py-1 rounded-full text-[10px] border border-zinc-700 uppercase tracking-widest text-zinc-400">System Idle</div>
                </div>
                
                <div class="flex justify-between items-end">
                    <div class="w-24 h-24 border-4 border-zinc-500/30 rounded-full flex items-center justify-center">
                        <div class="w-4 h-4 bg-zinc-500/50 rounded-full"></div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-12 h-12 border-4 border-zinc-500/30 rounded-full"></div>
                        <div class="w-12 h-12 border-4 border-zinc-500/30 rounded-full"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="h-1/3 grid grid-cols-3 gap-4">
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4 overflow-hidden">
                <h2 class="text-[10px] font-bold uppercase text-zinc-500 mb-2 tracking-widest">Live Scanner</h2>
                <div id="logs" class="flex-1 overflow-y-auto text-[10px] font-mono leading-relaxed text-zinc-400 space-y-1"></div>
            </div>
            
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4 overflow-hidden">
                <h2 class="text-[10px] font-bold uppercase text-zinc-500 mb-2 tracking-widest">3D Models</h2>
                <ul id="modelList" class="flex-1 overflow-y-auto space-y-1"></ul>
            </div>
            
            <div class="flex flex-col bg-zinc-900 rounded-xl border border-zinc-800 p-4 overflow-hidden">
                <h2 class="text-[10px] font-bold uppercase text-zinc-500 mb-2 tracking-widest">All Assets</h2>
                <ul id="assetList" class="flex-1 overflow-y-auto space-y-1"></ul>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
