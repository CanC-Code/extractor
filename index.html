<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity APK Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .drop-zone { transition: all 0.3s ease; }
    .drop-zone.dragover { background-color: #1e3a8a; border-color: #3b82f6; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
  <div class="max-w-6xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-center mb-2">Unity APK Extractor</h1>
    <p class="text-center text-zinc-400 mb-10">Local APK → Mesh & Asset Extractor</p>

    <div id="dropZone" class="drop-zone border-2 border-dashed border-zinc-700 rounded-3xl p-20 text-center cursor-pointer hover:border-blue-500">
      <div class="text-8xl mb-6">📦</div>
      <p class="text-2xl font-medium mb-3">Drop APK file here</p>
      <p class="text-zinc-500">or click to browse</p>
      <input type="file" id="fileInput" class="hidden" accept=".apk,.unity3d">
    </div>

    <div class="mt-8 grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-zinc-900 rounded-2xl p-6 h-96 overflow-auto">
        <h3 class="font-semibold text-emerald-400 mb-4">Terminal</h3>
        <div id="logs" class="font-mono text-sm text-zinc-300 space-y-1"></div>
      </div>

      <div class="bg-zinc-900 rounded-2xl p-6 h-96 overflow-auto">
        <h3 class="font-semibold text-amber-400 mb-4">Assets Found (<span id="count">0</span>)</h3>
        <ul id="assetList" class="space-y-2"></ul>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
