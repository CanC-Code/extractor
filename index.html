<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity APK Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .drop-zone { transition: all 0.3s; }
    .drop-zone.dragover { background-color: #1e3a8a; border-color: #60a5fa; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">Unity APK Extractor</h1>
    <p class="text-center text-gray-400 mb-8">Extract meshes, textures & assets from Unity games locally in your browser</p>

    <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-600 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500">
      <div class="mb-4 text-6xl">📦</div>
      <p class="text-xl font-medium mb-2">Drop APK or .unity3d file here</p>
      <p class="text-gray-500">or</p>
      <input type="file" id="fileInput" class="hidden" accept=".apk,.unity3d,.bin">
      <button onclick="document.getElementById('fileInput').click()" 
              class="mt-4 px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-medium">
        Select File
      </button>
    </div>

    <div id="status" class="mt-8 hidden">
      <div class="flex justify-between text-sm mb-2">
        <span id="filename" class="font-medium"></span>
        <span id="progressText" class="text-blue-400">0%</span>
      </div>
      <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
        <div id="progressBar" class="h-full bg-blue-500 w-0 transition-all"></div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
      <!-- Logs -->
      <div class="bg-gray-900 rounded-xl p-5 h-96 overflow-auto" id="logContainer">
        <h3 class="font-semibold mb-3 text-green-400">Logs</h3>
        <div id="logs" class="font-mono text-sm space-y-1 text-gray-300"></div>
      </div>

      <!-- Assets -->
      <div class="bg-gray-900 rounded-xl p-5 h-96 overflow-auto">
        <h3 class="font-semibold mb-3 text-amber-400">Found Assets</h3>
        <div id="assets" class="space-y-2"></div>
      </div>
    </div>
  </div>

  <script src="js/worker.js"></script>
</body>
</html>
