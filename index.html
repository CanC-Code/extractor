<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Asset Extractor & Viewer</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Asset Extractor</h2>
            <div class="file-input-wrapper">
                <label for="apk-upload" class="custom-file-upload">Select Unity Archive (.apk / .bundle)</label>
                <input id="apk-upload" type="file" accept=".apk,.bundle,.assets" />
            </div>
            
            <div id="status-panel">
                <p>Status: <span id="status-text" class="highlight">Awaiting File...</span></p>
                <progress id="progress-bar" value="0" max="100"></progress>
            </div>

            <div id="archive-info" class="hidden">
                <h3>Archive Data</h3>
                <p>Signature: <span id="meta-sig">...</span></p>
                <p>Version: <span id="meta-ver">...</span></p>
                <p>Total Size: <span id="meta-size">...</span></p>
                <p>Models Found: <span id="meta-count" class="highlight">0</span></p>
            </div>

            <div class="asset-list-container">
                <h3>Extracted Meshes</h3>
                <ul id="asset-list"></ul>
            </div>
        </div>

        <div class="viewport">
            <canvas id="viewer-canvas"></canvas>
            <div id="overlay-ui">
                <div class="title">3D Preview</div>
                <div id="model-stats" class="hidden">
                    <span id="stat-verts">Verts: 0</span> | <span id="stat-faces">Faces: 0</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
