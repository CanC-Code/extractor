<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM UnityFS Asset Parser</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>UnityFS Archive Parser</h1>
        <p>Select an APK or Unity archive to decompress and parse locally via WebAssembly.</p>
        
        <div class="upload-section">
            <input type="file" id="file-input" accept="*/*" />
            <label for="file-input" id="file-label">Choose APK File...</label>
        </div>

        <div class="tabs">
            <button class="tab-link active" onclick="openTab(event, 'LiveScanner')">Live Scanner</button>
            <button class="tab-link" onclick="openTab(event, 'Models')">Models</button>
            <button class="tab-link" onclick="openTab(event, 'Files')">Files</button>
        </div>

        <div id="LiveScanner" class="tab-content active">
            <div id="status" class="status-box">Awaiting WASM initialization...</div>
            <div id="log-output" class="log-console"></div>
        </div>

        <div id="Models" class="tab-content">
            <div class="placeholder-text" id="models-placeholder">Extracted 3D meshes will populate here.</div>
            <div id="model-container"></div>
        </div>

        <div id="Files" class="tab-content">
            <div class="placeholder-text" id="files-placeholder">Parsed archive hierarchy will populate here.</div>
            <div id="file-tree"></div>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active-content");
            }
            tablinks = document.getElementsByClassName("tab-link");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active-content");
            evt.currentTarget.className += " active";
        }

        // Global Dictionary to hold extracted files in JS Memory
        window.extractedFiles = {};

        // Bridge function called by C++ EM_ASM block
        window.onFileExtracted = function(fileName, ptr, size) {
            // Slice creates a deep copy so we safely retain it when C++ rawData is freed
            const fileData = new Uint8Array(Module.HEAPU8.buffer, ptr, size).slice();
            window.extractedFiles[fileName] = fileData;
            
            updateFilesTab(fileName, fileData);
            
            // Auto-route target assets to the Model UI
            if (fileName.includes('.assets') || fileName.includes('.obj') || fileName.includes('.mesh')) {
                updateModelsTab(fileName, fileData);
            }
        };

        function updateFilesTab(fileName, fileData) {
            document.getElementById('files-placeholder').style.display = 'none';
            const container = document.getElementById('file-tree');

            const item = document.createElement('div');
            item.className = 'file-item';
            
            const mbSize = (fileData.length / 1024 / 1024).toFixed(2);
            item.innerHTML = `<span class="file-name">📄 ${fileName}</span><span class="file-size">${mbSize} MB</span>`;
            
            const btn = document.createElement('button');
            btn.className = 'download-btn';
            btn.innerText = 'Download';
            btn.onclick = () => downloadBlob(fileData, fileName);
            
            item.appendChild(btn);
            container.appendChild(item);
        }

        function updateModelsTab(fileName, fileData) {
            document.getElementById('models-placeholder').style.display = 'none';
            const container = document.getElementById('model-container');

            const item = document.createElement('div');
            item.className = 'file-item model-item';
            item.innerHTML = `<span class="file-name">🧊 ${fileName}</span>`;
            
            const btn = document.createElement('button');
            btn.className = 'action-btn';
            btn.innerText = 'Init Mesh Deinterleave';
            btn.onclick = () => {
                alert(`File size: ${fileData.length} bytes.\n\nReady to pass layout offsets to C++ _deinterleave_mesh via WASM HEAP.`);
            };
            
            item.appendChild(btn);
            container.appendChild(item);
        }

        function downloadBlob(data, name) {
            const blob = new Blob([data], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>

    <script>
        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    console.log(text);
                    const logConsole = document.getElementById('log-output');
                    if (logConsole) {
                        logConsole.innerHTML += text + '<br>';
                        logConsole.scrollTop = logConsole.scrollHeight;
                    }
                };
            })(),
            printErr: function(text) {
                console.error(text);
                const logConsole = document.getElementById('log-output');
                if (logConsole) {
                    logConsole.innerHTML += '<span style="color: red;">' + text + '</span><br>';
                    logConsole.scrollTop = logConsole.scrollHeight;
                }
            },
            onRuntimeInitialized: function() {
                document.getElementById('status').innerText = "WASM Engine Ready. Awaiting file.";
                document.getElementById('status').style.color = "#4CAF50";
            }
        };
    </script>
    
    <script src="build/parser.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const statusDiv = document.getElementById('status');
        const logConsole = document.getElementById('log-output');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileLabel.innerText = file.name;
            statusDiv.innerText = "Reading file into memory...";
            statusDiv.style.color = "#ff9800";
            logConsole.innerHTML = ""; 
            
            // Clear UI state for new parse
            document.getElementById('file-tree').innerHTML = '';
            document.getElementById('model-container').innerHTML = '';
            document.getElementById('files-placeholder').style.display = 'block';
            document.getElementById('models-placeholder').style.display = 'block';
            window.extractedFiles = {};

            const reader = new FileReader();
            reader.onload = function(event) {
                statusDiv.innerText = "Processing via C++ WASM Engine...";
                try {
                    const arrayBuffer = event.target.result;
                    const uint8Array = new Uint8Array(arrayBuffer);

                    const ptr = Module._malloc(uint8Array.length);
                    Module.HEAPU8.set(uint8Array, ptr);

                    Module._process_unity_archive(ptr, uint8Array.length);

                    Module._free(ptr);
                    
                    statusDiv.innerText = "Processing Complete. View extracted data in tabs.";
                    statusDiv.style.color = "#4CAF50";
                } catch (err) {
                    statusDiv.innerText = "Error during processing.";
                    statusDiv.style.color = "#f44336";
                    Module.printErr(err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
