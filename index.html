<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity APK Extractor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .drop-zone { transition: all 0.3s; }
    .drop-zone.dragover { background-color: #1e3a8a; border-color: #60a5fa; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">Unity APK Extractor</h1>
    <p class="text-center text-gray-400 mb-8">Load APK locally • Scan • Extract Meshes</p>

    <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-600 rounded-3xl p-16 text-center cursor-pointer mb-8">
      <div class="mb-6 text-7xl">📦</div>
      <p class="text-2xl font-medium">Drop APK file here</p>
      <p class="text-gray-500 mt-2">or click to select</p>
      <input type="file" id="apk-upload" class="hidden" accept=".apk,.unity3d,.bin">
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <!-- Logs -->
      <div class="lg:col-span-7 bg-gray-900 rounded-2xl p-6 h-[500px] overflow-auto">
        <h3 class="font-semibold mb-4 text-green-400">Terminal Log</h3>
        <div id="terminal-log" class="font-mono text-sm space-y-1"></div>
      </div>

      <!-- Assets -->
      <div class="lg:col-span-5 bg-gray-900 rounded-2xl p-6 h-[500px] overflow-auto">
        <h3 class="font-semibold mb-4 text-amber-400">Found Assets (<span id="asset-count">0</span>)</h3>
        <ul id="asset-list" class="space-y-3"></ul>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
