<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM UnityFS Asset Parser</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>UnityFS Archive Parser</h1>
        <p>Select an APK or Unity archive to decompress and parse locally via WebAssembly.</p>
        
        <div class="upload-section">
            <input type="file" id="file-input" accept="*/*" />
            <label for="file-input" id="file-label">Choose APK File...</label>
        </div>

        <div id="status" class="status-box">Awaiting WASM initialization...</div>
        
        <div id="log-output" class="log-console"></div>
    </div>

    <script>
        // Initialize Emscripten Module configuration before script loads
        var Module = {
            preRun: [],
            postRun: [],
            print: (function() {
                return function(text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                    const logConsole = document.getElementById('log-output');
                    if (logConsole) {
                        logConsole.innerHTML += text + '<br>';
                        logConsole.scrollTop = logConsole.scrollHeight;
                    }
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
                const logConsole = document.getElementById('log-output');
                if (logConsole) {
                    logConsole.innerHTML += '<span style="color: red;">' + text + '</span><br>';
                    logConsole.scrollTop = logConsole.scrollHeight;
                }
            },
            onRuntimeInitialized: function() {
                document.getElementById('status').innerText = "WASM Engine Ready. Awaiting file.";
                document.getElementById('status').style.color = "#4CAF50";
            }
        };
    </script>
    
    <script src="build/parser.js"></script>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const statusDiv = document.getElementById('status');
        const logConsole = document.getElementById('log-output');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileLabel.innerText = file.name;
            statusDiv.innerText = "Reading file into memory...";
            statusDiv.style.color = "#ff9800";
            logConsole.innerHTML = ""; // Clear previous logs

            const reader = new FileReader();
            
            reader.onload = function(event) {
                statusDiv.innerText = "Processing via C++ WASM Engine...";
                
                try {
                    const arrayBuffer = event.target.result;
                    const uint8Array = new Uint8Array(arrayBuffer);

                    if (!Module._process_unity_archive) {
                        throw new Error("WASM module not initialized or _process_unity_archive missing.");
                    }

                    // Allocate memory inside WASM heap
                    const ptr = Module._malloc(uint8Array.length);
                    if (!ptr) {
                        throw new Error("Failed to allocate memory in WASM heap.");
                    }

                    // Copy file data into WASM memory
                    Module.HEAPU8.set(uint8Array, ptr);

                    // Execute C++ logic
                    Module._process_unity_archive(ptr, uint8Array.length);

                    // Free allocated memory
                    Module._free(ptr);
                    
                    statusDiv.innerText = "Processing Complete.";
                    statusDiv.style.color = "#4CAF50";
                } catch (err) {
                    statusDiv.innerText = "Error during processing.";
                    statusDiv.style.color = "#f44336";
                    Module.printErr(err.message);
                }
            };

            reader.onerror = function() {
                statusDiv.innerText = "Failed to read file.";
                statusDiv.style.color = "#f44336";
            };

            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
