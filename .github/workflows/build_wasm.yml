name: Build WASM Parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'src/build.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-key: emsdk-${{ runner.os }}

      - name: Compile WASM Parser
        run: |
          cd src
          chmod +x build.sh
          ./build.sh 2>&1 | tee build.log
        shell: bash

      - name: Commit and Push Built Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add the files to bypass any .gitignore restrictions
          git add -f build/parser.js
          git add -f build/parser.wasm
          
          git commit -m "Auto-compile WASM artifacts" || echo "No changes to commit"
          
          # Fetch and rebase against the latest remote changes. 
          # -X theirs automatically resolves binary merge conflicts by favoring the newly compiled files.
          git pull --rebase --autostash -X theirs origin main
          
          # Push the updated local HEAD explicitly back to the remote main branch
          git push origin HEAD:main
