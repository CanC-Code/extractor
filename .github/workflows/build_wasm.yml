name: Build WASM Parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'src/build.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Required permission to push the built files back to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-key: emsdk-${{ runner.os }}

      - name: Compile WASM Parser
        run: |
          cd src
          chmod +x build.sh
          ./build.sh 2>&1 | tee build.log
        shell: bash

      - name: Commit and Push Built Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Force add the files to bypass any .gitignore restrictions
          git add -f build/parser.js
          git add -f build/parser.wasm
          
          git commit -m "Auto-compile WASM artifacts" || echo "No changes to commit"
          git push
