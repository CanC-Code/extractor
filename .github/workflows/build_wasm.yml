name: Build WASM Parser

on:
  workflow_dispatch: # This adds the "manual trigger" button in the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "EMSDK_ENV=$(pwd)/emsdk_env.sh" >> $GITHUB_ENV

      - name: Compile WASM
        run: |
          source ${{ env.EMSDK_ENV }}
          cd src
          chmod +x build.sh
          ./build.sh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-parser-build
          path: build/ # This captures everything generated by build.sh
