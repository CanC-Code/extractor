name: Build WASM Parser

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'build.sh'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-key: emsdk-${{ runner.os }}

      - name: Compile WASM Parser
        run: |
          cd src
          chmod +x build.sh
          ./build.sh 2>&1 | tee build.log
        shell: bash

      - name: Show Build Log
        run: cat src/build.log

      - name: List All Generated Files
        run: |
          echo "=== Root build/ ==="
          ls -la build/ 2>/dev/null || echo "No root build/"
          echo "=== src/build/ ==="
          ls -la src/build/ 2>/dev/null || echo "No src/build/"
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-parser-build
          path: |
            build/
            src/build/
          if-no-files-found: warn
          retention-days: 30